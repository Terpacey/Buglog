<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BugLog — Test Cases</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <h1><a href="https://github.com/Terpacey/Buglog" target="_blank">BugLog</a></h1>
    <p class="version">v0.6.0-alpha</p>
    <p class="byline"><a href="https://github.com/Terpacey?tab=repositories" target="_blank">by Hari C.</a></p>
  </header>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="test-cases.html" class="active">Test Cases</a>
    <a href="defects.html">Defects</a>
    <a href="metrics.html">Metrics</a>
    <a href="settings.html">Settings</a>
  </nav>

  <main>
    <section id="build-select-panel">
      <div id="project-select">
        <div class="select-panel">
          <span class="panel-label">Project</span>
          <select id="project">
            <option value="">Select...</option>
          </select>
        </div>
        <div class="select-panel">
          <span class="panel-label">Build</span>
          <select id="build">
            <option value="">Select...</option>
          </select>
        </div>
      </div>
      <span id="selection-msg" class="success-msg" style="display:none;"></span>
    </section>

    <section id="add-test-case">
      <h2>Add Test Case</h2>
      <form id="test-case-form">
        <!-- Test Case ID / Priority / Status -->
        <div class="form-row">
          <div class="form-field">
            <label for="tc-id">Test Case ID</label>
            <input id="tc-id" type="text" placeholder="e.g. TC_LOG_001">
          </div>
          <div class="form-field">
            <label for="priority">Priority</label>
            <select id="priority">
              <option value="P0">P0 — High</option>
              <option value="P1" selected>P1 — Medium</option>
              <option value="P2">P2 — Low</option>
            </select>
          </div>
          <div class="form-field">
            <label for="status">Status</label>
            <select id="status">
              <option value="Not Run" selected>Not Run</option>
              <option value="Passed">Passed</option>
              <option value="Failed">Failed</option>
              <option value="Blocked">Blocked</option>
            </select>
          </div>
        </div>
        <div class="form-field">
          <label for="title">Title</label>
          <input id="title" type="text" required placeholder="e.g. Login with valid credentials">
        </div>
        <div class="form-field">
          <label for="preconditions">Preconditions</label>
          <textarea id="preconditions" rows="2" placeholder="e.g. User is on the login page"></textarea>
        </div>
        <div class="form-field">
          <label for="steps">Steps</label>
          <textarea id="steps" rows="4" placeholder="1. Navigate to login&#10;2. Enter credentials&#10;3. Click Submit"></textarea>
        </div>
        <!-- Expected and actual result -->
        <div class="form-row">
          <div class="form-field">
            <label for="expected">Expected Result</label>
            <textarea id="expected" rows="2" placeholder="What should happen"></textarea>
          </div>
          <div class="form-field">
            <label for="actual">Actual Result</label>
            <textarea id="actual" rows="2" placeholder="What actually happened"></textarea>
          </div>
        </div>
        <div class="form-field">
          <label for="notes">Notes</label>
          <textarea id="notes" rows="2" placeholder="Any additional observations"></textarea>
        </div>
        <button type="submit" class="btn-primary">Add Test Case</button>
        <span id="tc-saved-msg" class="success-msg" style="display:none;">Test case added.</span>
      </form>
    </section>

    <section id="test-case-list">
      <h2>Test Cases</h2>
      <div class="table-panel">
        <table>
          <thead>
            <tr>
              <th>Test Case ID</th>
              <th>Title</th>
              <th>Priority</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="test-cases-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/sql-wasm.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/test-cases.js"></script>
</body>
</html>
